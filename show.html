<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Information</title>
    <link href="./js/layui/css/layui.css" rel="stylesheet">
    <style>
        .carousel-full-width-image {
            width: 100%;
            height: 100%;
        }

        .full-width-image {
            width: 100%;
            height: 75%;
            border-radius: 8px;
        }

        .shop {
            height: 210px;
        }

    </style>
</head>
<body>
<div class="layui-layout layui-layout-admin">
    <div class="layui-header">
        <div class="layui-logo" style="width: 130px">Information</div>
    </div>
    <div class="layui-body" style="left: 0;width: 100%">
        <!-- 轮播图 -->
        <div class="layui-carousel" id="ID-carousel-demo-image">
            <div carousel-item id="ID-carousel-image-list">

            </div>
        </div>
        <div style="padding: 16px">
            <h2>Price：<span style="color: red" id="ID-price"></span></h2>
            <h1 id="ID-title"></h1>
        </div>
        <div>
            <fieldset class="layui-elem-field layui-field-title">
                <legend>Pruduct detail</legend>
            </fieldset>
        </div>

        <div style="padding: 16px">
            <p id="ID-detail">

            </p>
        </div>
        <div>
            <fieldset class="layui-elem-field layui-field-title">
                <legend>Contact</legend>
            </fieldset>
        </div>
        <div style="padding: 16px;text-align: center">
            <!-- 底部固定区域 -->
           
            <a href="https://www.facebook.com/p/Guangzhou-Doral-Cosmetics-CO-Ltd-100072184969860/?paipv=0&eav=AfacvDJ_c_BIvoRxiQiGF9yEAT58SV6cr6Ur3Lp62ozoBdwgKO2DgdtI8szElKISSiA&_rdr"><img style="width: 70px;height: 70px;" src="./image/Facebook.png" title="facebook"></img></a>
            <a href="mailto:Doralcosmetics@163.com" target="_blank"><img style="width: 70px;height: 70px;" src="./image/gemail.jpg" title="gemail"></img></a>
            <a href="https://wa.me/message/EED3VREMB5ZXE1" target="_blank"><img style="width: 70px;height: 70px;" src="./image/WhatsApp.jpg" title="WhatsApp"></img></a>
    
            <a href="https://instagram.com/haircareproduct_doral?igshid=OGQ5ZDc2ODk2ZA==" target="_blank"><img style="width: 70px;height: 70px;" src="./image/Instagram.webp" title="Instagram"></img></a>
       
        </br>
            <h3>address:<span id="ID-address"></span></h3>
        </div>
    </div>

    <!--    </div>-->

</div>


</script>
<script src="./js/layui/layui.js"></script>
<script src="./js/data.js"></script>
<script>
    // Usage
    layui.use(function () {
        var layer = layui.layer;
        // Welcome
        var carousel = layui.carousel;
        var element = layui.element;
        var util = layui.util;
        var $ = layui.$;

        let productId = layui.url().search.id;

        let find = data.productList.find(function (value) {
            return value.id == productId
        });

        let $carousel = $("#ID-carousel-image-list");

        if (find === undefined || find === null) {
            layer.msg('商品不存在', {icon: 2});
            return
        }
        console.log(productId);
        console.log(find);

        $("#ID-phone").text(data.contact.Whatsapp)
        $("#ID-email").attr('href',"mailto:"+data.contact.Email)
        $("#ID-email").text(data.contact.Email)
        $("#ID-address").text(data.contact.Address)
        $("#ID-facebook").attr('href',data.contact.FacebookUrl)
        $("#ID-facebook").text(data.contact.FacebookName)

        $("#ID-detail").text(find.detail)
        $("#ID-price").text(find.price)
        $("#ID-title").text(find.title)

        find.img.forEach(function (value, index) {
            $carousel.append(" <div>" +
                "<img src='" + value + "' class=\"carousel-full-width-image\">\n" +
                "                </div>");

        })


        // 渲染 - 图片轮播
        carousel.render({
            elem: '#ID-carousel-demo-image',
            width: '100%',
            height: '300px',
            interval: 3000
        });
        //头部事件
        util.event('lay-header-event', {
            menuLeft: function (othis) { // 左侧菜单事件
                layer.msg('展开左侧菜单的操作', {icon: 0});
            },
            menuRight: function () {  // 右侧菜单事件
                layer.open({
                    type: 1,
                    title: '更多',
                    content: '<div style="padding: 15px;">处理右侧面板的操作</div>',
                    area: ['260px', '100%'],
                    offset: 'rt', // 右上角
                    anim: 'slideLeft', // 从右侧抽屉滑出
                    shadeClose: true,
                    scrollbar: false
                });
            }
        });


    });
</script>
</body>
</html>
