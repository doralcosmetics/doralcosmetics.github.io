<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product category</title>
    <link href="//cdn.staticfile.org/layui/2.8.10/css/layui.css" rel="stylesheet">
    <style>
        .carousel-full-width-image {
            width: 100%;
            height: 100%;
        }

        .full-width-image {
            width: 100%;
            height: 75%;
            border-radius: 8px;
        }

        .shop {
            height: 210px;
        }

    </style>
</head>
<body>

<div class="layui-layout layui-layout-admin">
    <div class="layui-header">
        <div class="layui-logo" style="width: 200px">product infornations</div>
    </div>
    <div class="layui-side layui-bg-gray" style="margin-bottom: 60px;width: 100px">

        <div class="layui-side-scroll">
            <!-- 左侧导航区域（可配合layui已有的垂直导航） -->
            <ul class="layui-nav layui-nav-tree layui-bg-gray" lay-filter="categoryNav">
                <li class="layui-nav-item layui-this"><a href="javascript:;">All</a></li>
            </ul>
        </div>
    </div>
    <div class="layui-body" style="left: 102px">
        <div class="layui-container" style="padding-bottom: 80px;padding-top: 16px">
            <!-- 内容主体区域 -->
            <div class="layui-row layui-col-space14" id="ID-flow-lazyimg">

            </div>
        </div>
    </div>
    <div class="layui-footer" style="left: 0;width: 100%;height: 60px;padding: 0;z-index: 1000">
        <!-- 底部固定区域 -->
        <ul class="layui-nav layui-bg-gray lay-unselect" style="padding: 0!important;width: 100%">
            <li class="layui-nav-item" style="width: 50%;text-align: center"><a href="index.html">Home</a></li>
            <li class="layui-nav-item  layui-this" style="width: 50%;text-align: center"><a href="category.html">Category</a>
            </li>
        </ul>
    </div>
</div>


</script>
<script src="//cdn.staticfile.org/layui/2.8.10/layui.js"></script>
<script src="./js/data.js"></script>
<script>
    // Usage
    layui.use(function () {
        var layer = layui.layer;
        // Welcome
        var carousel = layui.carousel;
        var element = layui.element;
        var util = layui.util;
        var $ = layui.$;
        // 渲染 - 图片轮播
        var flow = layui.flow;
        // 图片懒加载

        let $flowLazyimg = $("#ID-flow-lazyimg");
        let $layuiNav = $(".layui-nav");


        $("#ID-keyword").val("");


        data.category.forEach(function (value, index) {
            $layuiNav.append("<li class=\"layui-nav-item\"><a href=\"javascript:;\">" + value + "</a></li>");
        })

        element.on('nav(categoryNav)', function (elem) {
            let keyword = elem.text();
            $flowLazyimg.children().remove()
            data.productList.filter(function (value) {
                if (keyword === undefined || keyword === null || keyword === '全部') {
                    return true;
                }
                return  value.category.includes(keyword)
            }).forEach(function (value, index) {

                $flowLazyimg.append(" <div class=\"layui-col-xs6 layui-col-sm6 layui-col-md4 shop\" onclick=\"window.location.href='show.html?id=" + value.id + "'\">\n" +
                    "                    <img lay-src=\""+value.img[0]+"\" class=\"full-width-image\">\n" +
                    "                    <h4>" + value.title + "</h4>\n" +
                    "                    <h3>Price：<span style=\"color: red\">" + value.price + "</span></h3>\n" +
                    "                </div>");

            })
            if ($flowLazyimg.children().length === 0) {
                $flowLazyimg.append("<span>empty</span>")
            }

            flow.lazyimg({
                elem: '#ID-flow-lazyimg img',
            });
        })

        data.productList.forEach(function (value, index) {

            $flowLazyimg.append(" <div class=\"layui-col-xs6 layui-col-sm6 layui-col-md4 shop\" onclick=\"window.location.href='show.html?id=" + value.id + "'\">\n" +
                "                    <img lay-src=\"" + value.img[0] + "\" class=\"full-width-image\">\n" +
                "                    <h4>" + value.title + "</h4>\n" +
                "                    <h3>Price：<span style=\"color: red\">" + value.price + "</span></h3>\n" +
                "                </div>");

        })

        element.render('nav', 'categoryNav');

        var flow = layui.flow;
        // 图片懒加载
        flow.lazyimg({
            elem: '#ID-flow-lazyimg img',
        });

        $("#ID-phone").text(data.contact.Whatsapp)
        $("#ID-email").text(data.contact.Email)
        $("#ID-address").text(data.contact.Address)




        $("#ID-search").on('click', function () {
            let keyword = $("#ID-keyword").val();

            $flowLazyimg.children().remove()
            data.productList.filter(function (value) {
                if (keyword === undefined || keyword === null || keyword === '') {
                    return true;
                }
                return value.title.includes(keyword)
            }).forEach(function (value, index) {

                $flowLazyimg.append(" <div class=\"layui-col-xs6 layui-col-sm6 layui-col-md4 shop\" onclick=\"window.location.href='show.html?id=" + value.id + "'\">\n" +
                    "                    <img lay-src=\"https://unpkg.com/outeres@0.0.11/demo/wallpaper.jpg\" class=\"full-width-image\">\n" +
                    "                    <h4>" + value.title + "</h4>\n" +
                    "                    <h3>Price：<span style=\"color: red\">" + value.price + "</span></h3>\n" +
                    "                </div>");

            })
            flow.lazyimg({
                elem: '#ID-flow-lazyimg img',
            });
        })




        flow.lazyimg({
            elem: '#ID-flow-lazyimg img',
        });
    });
</script>

</body>
</html>
