        </script>
        <script src="./js/layui/layui.js"></script>
        <script src="./js/data.js"></script>
        <script>
            // Usage
            layui.use(function () {
                var layer = layui.layer;
                // Welcome
                var carousel = layui.carousel;
                var element = layui.element;
                var util = layui.util;
                var $ = layui.$;
                var rate = layui.rate;

                $("#ID-about").attr("src", data.about)

                if (layui.url(location.href).search.from) {
                    $("#ID-nav-about").addClass('layui-this');

                } else {
                    $("#ID-nav-home").addClass('layui-this')
                }


                var util = layui.util;
                // 自定义固定条
                util.fixbar({
                    bars: [{ // 定义可显示的 bar 列表信息 -- v2.8.0 新增
                        type: 'facebook',
                        content: '<a href="https://www.facebook.com/p/Guangzhou-Doral-Cosmetics-CO-Ltd-100072184969860/?paipv=0&eav=AfacvDJ_c_BIvoRxiQiGF9yEAT58SV6cr6Ur3Lp62ozoBdwgKO2DgdtI8szElKISSiA&_rdr"><img style="width: 50px;height: 50px;" src="./image/Facebook.png" title="facebook"></img></a>'
                    }, {
                        type: 'gmail',
                        content: ' <a href="mailto:Doralcosmetics@163.com" target="_blank"><img style="width: 50px;height: 50px;" src="./image/Gmail.jpg" title="gmail"></img></a>'
                    }, {
                        type: 'WhatsApp',
                        content: '  <a href="https://wa.me/message/EED3VREMB5ZXE1" target="_blank"><img style="width: 50px;height: 50px;" src="./image/WhatsApp.jpg" title="WhatsApp"></img></a>',
            
                    }, {
                        type: 'Instagram',
                        content: '<a href="https://instagram.com/haircareproduct_doral?igshid=OGQ5ZDc2ODk2ZA==" target="_blank"><img style="width: 50px;height: 50px;" src="./image/Instagram.webp" title="Instagram"></img></a>',
                 
                    }],
                    // bar1: true,
                    // bar2: true,
                    // default: false, // 是否显示默认的 bar 列表 --  v2.8.0 新增
                    // bgcolor: '#393D52', // bar 的默认背景色
                    // css: {right: 100, bottom: 100},
                    // target: '#target-test', // 插入 fixbar 节点的目标元素选择器
                    // duration: 300, // top bar 等动画时长（毫秒）
                    on: { // 任意事件 --  v2.8.0 新增
                        mouseenter: function (type) {
                            layer.tips(type, this, {
                                tips: 4,
                                fixed: true
                            });
                        },
                        mouseleave: function (type) {
                            layer.closeAll('tips');
                        }
                    },
                    // 点击事件
                    click: function (type) {
                        console.log(this, type);
                        // layer.msg(type);
                    },
                    default:false,
                    css: { bottom: 60 }
                });

                // 批量渲染
                rate.render({
                    elem: '.feedback-rate',
                    readonly: true
                });

                // 渲染 - 图片轮播

                let $carousel = $("#ID-carousel-image-list");
                let $flowPruductLazyimg = $("#ID-flow-product-lazyimg");
                let $flowFeedbackLazyimg = $("#ID-flow-feedback-lazyimg");


                $("#ID-keyword").val("");



                data.head.forEach(function (value, index) {
                  
                        if(value.productId){
                            $carousel.append(" <div>" +
                        "<img src='" + value.img + "' class=\"carousel-full-width-image\" style=\" cursor:pointer;\" onclick=\"window.location.href='show.html?id=" + value.productId + "'\">\n" +
                        "                </div>");
                        }else{
                            $carousel.append(" <div>" +
                        "<img src='" + value.img + "' class=\"carousel-full-width-image\" >\n" +
                        "                </div>");
                        }

                })


                data.productList.slice(0, 6).forEach(function (value, index) {

                    $flowPruductLazyimg.append(" <div class=\"layui-col-xs6 layui-col-sm4 layui-col-md2 layui-col-lg2 shop\" style=\" cursor:pointer;\" onclick=\"window.location.href='show.html?id=" + value.id + "'\">\n" +
                        "                    <img lay-src=\"" + value.img[0] + "\" class=\"full-width-image\">\n" +
                        "                    <h4>" + value.title + "</h4>\n" +
                        "                    <h3>Price：<span style=\"color: red\">" + value.price + "</span></h3>\n" +
                        "                </div>");

                })

                data.feedbackList.slice(0, 6).forEach(function (value, index) {
                    $flowFeedbackLazyimg.append("<div class=\"layui-col-xs6 layui-col-sm4 layui-col-md2 layui-col-lg2 shop\" style=\" cursor:pointer;\" onclick=\"window.location.href='show.html?id=" + value.productId + "'\">" +
                        " <img src=\""+value.img[0]+"\"" +
                        "  class=\"full-width-image\">" +
                        "  <div class=\"feedback-rate\" lay-options=\"{value: "+value.score+"}\"></div>" +
                        " <p>"+value.content+"</p>" +
                        "</div>");
                           // 批量渲染
                rate.render({
                    elem: '.feedback-rate',
                    readonly: true
                });
                })

                $("#ID-phone").text(data.contact.Whatsapp)
                $("#ID-email").text(data.contact.Email)
                $("#ID-address").text(data.contact.Address)


                var myCarousel = carousel.render({
                    elem: '#ID-carousel-image',
                    width: '100%',
                    height: '40%',
                    interval: 3000
                });

                //头部事件
                util.event('lay-header-event', {
                    menuLeft: function (othis) { // 左侧菜单事件
                        layer.msg('展开左侧菜单的操作', { icon: 0 });
                    },
                    menuRight: function () {  // 右侧菜单事件
                        layer.open({
                            type: 1,
                            title: '更多',
                            content: '<div style="padding: 15px;">处理右侧面板的操作</div>',
                            area: ['260px', '100%'],
                            offset: 'rt', // 右上角
                            anim: 'slideLeft', // 从右侧抽屉滑出
                            shadeClose: true,
                            scrollbar: false
                        });
                    }
                });

                $("#ID-search").on('click', function () {
                    let keyword = $("#ID-keyword").val();

                    $flowPruductLazyimg.children().remove()
                    data.productList.filter(function (value) {
                        if (keyword === undefined || keyword === null || keyword === '') {
                            return true;
                        }
                        return value.title.includes(keyword)
                    }).forEach(function (value, index) {

                        $flowPruductLazyimg.append(" <div class=\"layui-col-xs6 layui-col-sm4 layui-col-md2 layui-col-lg2 shop\" style=\" cursor:pointer;\" onclick=\"window.location.href='show.html?id=" + value.id + "'\">\n" +
                            "                    <img lay-src=\"" + value.img[0] + "\" class=\"full-width-image\">\n" +
                            "                    <h4>" + value.title + "</h4>\n" +
                            "                    <h3>Price：<span style=\"color: red\">" + value.price + "</span></h3>\n" +
                            "                </div>");

                    })
                    flow.lazyimg({
                        elem: '#ID-flow-demo-lazyimg img',
                    });
                })

                var flow = layui.flow;
                // 图片懒加载


                flow.lazyimg({
                    elem: '#ID-flow-demo-lazyimg img',
                });
            });
        </script>
